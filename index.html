<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Hub - Multi-Language Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #00ff88;
            --danger: #ff003c;
            --dark-bg: #05070a;
            --panel: #0f121a;
            --btn-num: #1c212d;
            --accent: #ff00ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
            transition: direction 0.3s;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0d14;
            border-bottom: 2px solid var(--primary);
        }

        .logo { font-family: 'Orbitron'; font-weight: bold; color: var(--primary); font-size: 20px; text-shadow: 0 0 10px var(--primary); }
        
        .top-tools { display: flex; gap: 8px; align-items: center; }
        .tool-btn {
            background: #1a1f2b; color: #fff; border: 1px solid #333;
            padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s;
            font-size: 13px; font-weight: bold;
        }
        .tool-btn:hover { border-color: var(--primary); transform: translateY(-2px); }

        #lang-select {
            background: #1a1f2b; color: var(--primary); border: 1px solid var(--primary);
            border-radius: 5px; padding: 4px; font-size: 12px; cursor: pointer;
        }

        .main-content {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 15px; position: relative; overflow-y: auto;
        }

        .calc-container {
            width: 100%; max-width: 450px; background: var(--panel);
            padding: 20px; border-radius: 20px; border: 1px solid #222;
        }

        .screen {
            background: #000; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; border: 1px solid var(--primary);
            text-align: left; direction: ltr;
        }
        #display-val { font-family: 'Orbitron'; font-size: 32px; color: #fff; min-height: 45px; word-break: break-all; }
        #display-step { font-size: 13px; color: var(--primary); opacity: 0.6; height: 18px; margin-bottom: 4px; }

        .calc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .btn {
            padding: 12px; border: none; border-radius: 10px; font-family: 'Cairo';
            font-weight: bold; cursor: pointer; color: #fff; font-size: 16px; transition: 0.15s;
        }
        .btn:active { transform: scale(0.92); }
        .btn-sci { background: #1a2533; color: var(--primary); font-size: 13px; }
        .btn-num { background: var(--btn-num); }
        .btn-op { background: #161b22; color: var(--secondary); }
        .btn-del { background: #3d1a1a; color: var(--danger); }
        .btn-eq { background: linear-gradient(135deg, var(--primary), #0066ff); grid-column: span 2; font-size: 22px; }

        .bottom-bar {
            background: #0a0d14; border-top: 1px solid #222;
            padding: 10px; display: flex; justify-content: space-around;
        }
        .quick-btn {
            background: none; border: none; color: #888; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px;
        }
        .quick-btn:hover { color: var(--primary); }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--panel); width: 95%; max-width: 500px;
            max-height: 90vh; border-radius: 20px; border: 1px solid var(--primary);
            display: flex; flex-direction: column; position: relative; padding: 20px; overflow-y: auto;
        }
        .close-modal {
            position: absolute; top: 10px; right: 10px; background: var(--danger);
            width: 30px; height: 30px; border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100;
        }

        .game-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .game-item { background: #1a1f2b; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .game-item:hover { border-color: var(--primary); background: #252b3d; }

        canvas { display: block; margin: 10px auto; background: #000; border: 1px solid #333; touch-action: none; }
        
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-width: 200px; margin: 0 auto; }
        .ttt-cell { width: 60px; height: 60px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border-radius: 5px; }

        .timer-settings { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .timer-settings input { width: 60px; text-align: center; background: #111; border: 1px solid var(--primary); color: #fff; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">

<header>
    <div class="logo">QUANTUM HUB</div>
    <div class="top-tools">
        <select id="lang-select" onchange="changeLanguage()">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
        <button class="tool-btn" data-i18n="draw" onclick="openModal('draw-modal')">🎨 رسم</button>
        <button class="tool-btn" data-i18n="physics" onclick="openModal('physics-modal')">⚛️ فيزياء</button>
    </div>
</header>

<main class="main-content">
    <div class="calc-container">
        <div class="screen">
            <div id="display-step"></div>
            <div id="display-val">0</div>
        </div>
        <div class="calc-grid">
            <button class="btn btn-sci" onclick="ins('Math.sin(')">sin</button>
            <button class="btn btn-sci" onclick="ins('Math.cos(')">cos</button>
            <button class="btn btn-sci" onclick="ins('Math.tan(')">tan</button>
            <button class="btn btn-sci" onclick="ins('Math.sqrt(')">√</button>
            <button class="btn btn-sci" onclick="ins('**')">^</button>

            <button class="btn btn-del" onclick="clr()">AC</button>
            <button class="btn btn-del" onclick="del()">DEL</button>
            <button class="btn btn-op" onclick="ins('(')">(</button>
            <button class="btn btn-op" onclick="ins(')')">)</button>
            <button class="btn btn-op" onclick="ins('/')">÷</button>

            <button class="btn btn-num" onclick="ins('7')">7</button>
            <button class="btn btn-num" onclick="ins('8')">8</button>
            <button class="btn btn-num" onclick="ins('9')">9</button>
            <button class="btn btn-op" onclick="ins('*')">×</button>
            <button class="btn btn-sci" onclick="ins('Math.PI')">π</button>

            <button class="btn btn-num" onclick="ins('4')">4</button>
            <button class="btn btn-num" onclick="ins('5')">5</button>
            <button class="btn btn-num" onclick="ins('6')">6</button>
            <button class="btn btn-op" onclick="ins('-')">−</button>
            <button class="btn btn-sci" onclick="ins('Math.log10(')">log</button>

            <button class="btn btn-num" onclick="ins('1')">1</button>
            <button class="btn btn-num" onclick="ins('2')">2</button>
            <button class="btn btn-num" onclick="ins('3')">3</button>
            <button class="btn btn-op" onclick="ins('+')">+</button>
            <button class="btn btn-sci" onclick="ins('%')">%</button>

            <button class="btn btn-num" onclick="ins('0')">0</button>
            <button class="btn btn-num" onclick="ins('.')">.</button>
            <button class="btn btn-eq" onclick="calculate()">=</button>
            <button class="btn btn-sci" onclick="toBin()">BIN</button>
        </div>
    </div>
</main>

<div class="bottom-bar">
    <button class="quick-btn" onclick="openModal('timer-modal')"><span id="timer-icon">⏱️</span><span data-i18n="timer">مؤقت</span></button>
    <button class="quick-btn" onclick="openModal('bmi-modal')"><span>💪</span><span data-i18n="health">صحتي</span></button>
    <button class="quick-btn" onclick="openModal('game-center-modal')"><span>🎮</span><span data-i18n="games">الألعاب</span></button>
</div>

<!-- Game Center Modal -->
<div id="game-center-modal" class="modal">
    <div class="modal-content">
        <div class="close-modal" onclick="closeModal('game-center-modal')">X</div>
        <h2 style="color:var(--primary); text-align:center;" data-i18n="gameCenter">🎮 مركز الألعاب</h2>
        <div class="game-menu" id="game-main-menu">
            <div class="game-item" onclick="startSnake()" data-i18n="gameSnake">🐍 الثعبان</div>
            <div class="game-item" onclick="startMemory()" data-i18n="gameMemory">🧩 الذاكرة</div>
            <div class="game-item" onclick="startTTT()" data-i18n="gameTTT">❌ إكس أو</div>
            <div class="game-item" onclick="startCatcher()" data-i18n="gameCatcher">⭐ صائد النجوم</div>
        </div>
        
        <div id="game-play-area" style="display:none;">
            <button class="tool-btn" onclick="backToMenu()" data-i18n="back">⬅ العودة</button>
            <div id="game-stage" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<!-- Timer Modal -->
<div id="timer-modal" class="modal">
    <div class="modal-content">
        <div class="close-modal" onclick="closeModal('timer-modal')">X</div>
        <h2 style="color:var(--accent); text-align:center;" data-i18n="timerTitle">⏱️ المؤقت</h2>
        <div class="timer-settings">
            <input type="number" id="th" value="0" placeholder="H">
            <input type="number" id="tm" value="5" placeholder="M">
            <input type="number" id="ts" value="0" placeholder="S">
        </div>
        <div id="timer-display" style="font-size:50px; text-align:center; font-family:'Orbitron'; color:var(--primary);">00:05:00</div>
        <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button class="tool-btn" onclick="startTimer()" data-i18n="start">ابدأ</button>
            <button class="tool-btn" onclick="resetTimer()" data-i18n="reset">تصفير</button>
        </div>
    </div>
</div>

<!-- BMI Modal -->
<div id="bmi-modal" class="modal">
    <div class="modal-content">
        <div class="close-modal" onclick="closeModal('bmi-modal')">X</div>
        <h2 style="text-align:center;" data-i18n="bmiTitle">💪 حاسبة كتلة الجسم</h2>
        <div style="padding:20px; display:flex; flex-direction:column; gap:10px;">
            <input type="number" id="w" data-i18n-placeholder="weight" placeholder="الوزن كجم">
            <input type="number" id="h" data-i18n-placeholder="height" placeholder="الطول سم">
            <button class="btn btn-op" onclick="calcBMI()" data-i18n="calc">احسب</button>
            <div id="bmi-res" style="text-align:center;"></div>
        </div>
    </div>
</div>

<div id="draw-modal" class="modal"><div class="modal-content"><div class="close-modal" onclick="closeModal('draw-modal')">X</div><canvas id="canvas" width="400" height="300"></canvas></div></div>
<div id="physics-modal" class="modal"><div class="modal-content"><div class="close-modal" onclick="closeModal('physics-modal')">X</div><canvas id="physics-canvas" width="400" height="300"></canvas></div></div>

<script>
    // --- Translation System ---
    const translations = {
        ar: {
            draw: "🎨 رسم", physics: "⚛️ فيزياء", timer: "مؤقت", health: "صحتي", games: "الألعاب",
            gameCenter: "🎮 مركز الألعاب", gameSnake: "🐍 الثعبان", gameMemory: "🧩 الذاكرة",
            gameTTT: "❌ إكس أو", gameCatcher: "⭐ صائد النجوم", back: "⬅ العودة",
            timerTitle: "⏱️ المؤقت", start: "ابدأ", reset: "تصفير", 
            bmiTitle: "💪 حاسبة كتلة الجسم", weight: "الوزن كجم", height: "الطول سم", calc: "احسب",
            gameOver: "انتهت اللعبة! النتيجة: ", timeUp: "انتهى الوقت!"
        },
        en: {
            draw: "🎨 Draw", physics: "⚛️ Physics", timer: "Timer", health: "Health", games: "Games",
            gameCenter: "🎮 Game Center", gameSnake: "🐍 Snake", gameMemory: "🧩 Memory",
            gameTTT: "❌ Tic-Tac-Toe", gameCatcher: "⭐ Star Catch", back: "⬅ Back",
            timerTitle: "⏱️ Timer", start: "Start", reset: "Reset",
            bmiTitle: "💪 BMI Calculator", weight: "Weight (kg)", height: "Height (cm)", calc: "Calculate",
            gameOver: "Game Over! Score: ", timeUp: "Time is up!"
        },
        fr: {
            draw: "🎨 Dessin", physics: "⚛️ Physique", timer: "Minuteur", health: "Santé", games: "Jeux",
            gameCenter: "🎮 Centre de Jeux", gameSnake: "🐍 Serpent", gameMemory: "🧩 Mémoire",
            gameTTT: "❌ Tic-Tac-Toe", gameCatcher: "⭐ Capture d'étoile", back: "⬅ Retour",
            timerTitle: "⏱️ Minuteur", start: "Démarrer", reset: "Réinitialiser",
            bmiTitle: "💪 Calculateur d'IMC", weight: "Poids (kg)", height: "Taille (cm)", calc: "Calculer",
            gameOver: "Fin du jeu! Score: ", timeUp: "Temps écoulé!"
        }
    };

    let currentLang = 'ar';

    function changeLanguage() {
        currentLang = document.getElementById('lang-select').value;
        const html = document.getElementById('main-html');
        html.lang = currentLang;
        html.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';

        // Translate Text Content
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.innerText = translations[currentLang][key];
        });

        // Translate Placeholders
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            el.placeholder = translations[currentLang][key];
        });
    }

    // --- Calculator Logic ---
    let expr = "";
    function ins(v) { expr += v; update(); }
    function clr() { expr = ""; document.getElementById('display-step').innerText = ""; update(); }
    function del() { expr = expr.slice(0, -1); update(); }
    function update() { document.getElementById('display-val').innerText = expr.replace(/\*/g,'×').replace(/\//g,'÷') || "0"; }
    function calculate() { try { expr = eval(expr).toString(); update(); } catch(e){ expr=""; update(); } }
    function toBin() { try { document.getElementById('display-val').innerText = parseInt(eval(expr)).toString(2); } catch(e){} }

    // --- Game Navigation ---
    let gameInterval;
    function backToMenu() {
        clearInterval(gameInterval);
        document.getElementById('game-main-menu').style.display = 'grid';
        document.getElementById('game-play-area').style.display = 'none';
        document.getElementById('game-stage').innerHTML = "";
    }

    // --- Snake Game ---
    function startSnake() {
        document.getElementById('game-main-menu').style.display = 'none';
        document.getElementById('game-play-area').style.display = 'block';
        const stage = document.getElementById('game-stage');
        stage.innerHTML = '<canvas id="g-canvas" width="280" height="280"></canvas>';
        const cvs = document.getElementById('g-canvas');
        const ctx = cvs.getContext('2d');
        let snake = [{x:10, y:10}], food = {x:5,y:5}, dx=1, dy=0, score=0;
        
        gameInterval = setInterval(() => {
            const head = {x: snake[0].x+dx, y: snake[0].y+dy};
            if(head.x<0||head.x>=20||head.y<0||head.y>=20||snake.some(s=>s.x===head.x&&s.y===head.y)) {
                alert(translations[currentLang].gameOver + score);
                return backToMenu();
            }
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) {
                score += 10;
                food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            } else snake.pop();
            
            ctx.fillStyle='#000'; ctx.fillRect(0,0,280,280);
            ctx.fillStyle='#0f8'; snake.forEach(s=>ctx.fillRect(s.x*14, s.y*14, 13, 13));
            ctx.fillStyle='#f05'; ctx.fillRect(food.x*14, food.y*14, 13, 13);
        }, 150);

        window.snakeMove = (d) => {
            if(d=='up'&&dy==0){dx=0;dy=-1}
            if(d=='down'&&dy==0){dx=0;dy=1}
            if(d=='left'&&dx==0){dx=-1;dy=0}
            if(d=='right'&&dx==0){dx=1;dy=0}
        };
    }

    // --- Memory Game ---
    function startMemory() {
        document.getElementById('game-main-menu').style.display = 'none';
        document.getElementById('game-play-area').style.display = 'block';
        const stage = document.getElementById('game-stage');
        stage.innerHTML = '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px;" id="m-grid"></div>';
        const grid = document.getElementById('m-grid');
        const icons = ['🔥','🔥','💎','💎','🌈','🌈','🚀','🚀','🍀','🍀','⭐','⭐','🍎','🍎','🎈','🎈'].sort(()=>Math.random()-0.5);
        let flipped = [];
        icons.forEach(ic => {
            const card = document.createElement('div');
            card.style = "height:50px; background:#222; border-radius:5px; display:flex; align-items:center; justify-content:center; cursor:pointer;";
            card.onclick = () => {
                if(flipped.length<2 && !card.innerText) {
                    card.innerText = ic; card.style.background = "#00f2ff"; flipped.push(card);
                    if(flipped.length==2) {
                        if(flipped[0].innerText === flipped[1].innerText) flipped = [];
                        else setTimeout(()=>{ flipped.forEach(c=>{c.innerText=""; c.style.background="#222"}); flipped=[] }, 500);
                    }
                }
            };
            grid.appendChild(card);
        });
    }

    // --- Tic Tac Toe ---
    function startTTT() {
        document.getElementById('game-main-menu').style.display = 'none';
        document.getElementById('game-play-area').style.display = 'block';
        const stage = document.getElementById('game-stage');
        stage.innerHTML = '<div class="ttt-grid" id="ttt"></div>';
        const grid = document.getElementById('ttt');
        let turn = 'X', cells = Array(9).fill(null);
        for(let i=0; i<9; i++) {
            const div = document.createElement('div');
            div.className = 'ttt-cell';
            div.onclick = () => {
                if(!cells[i]) {
                    cells[i] = turn; div.innerText = turn;
                    div.style.color = turn === 'X' ? 'var(--primary)' : 'var(--secondary)';
                    turn = turn === 'X' ? 'O' : 'X';
                }
            };
            grid.appendChild(div);
        }
    }

    // --- Star Catcher ---
    function startCatcher() {
        document.getElementById('game-main-menu').style.display = 'none';
        document.getElementById('game-play-area').style.display = 'block';
        const stage = document.getElementById('game-stage');
        stage.innerHTML = '<div style="text-align:center;">Score: <span id="pts">0</span></div><canvas id="c-canvas" width="280" height="200"></canvas>';
