<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Hub Pro - Ultra Scientific Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #00ff88;
            --danger: #ff003c;
            --dark-bg: #05070a;
            --panel: #0f121a;
            --btn-num: #1c212d;
            --btn-sci: #252d3d;
            --accent: #ff00ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0d14;
            border-bottom: 2px solid var(--primary);
        }

        .logo { font-family: 'Orbitron'; color: var(--primary); font-size: 18px; text-shadow: 0 0 10px var(--primary); }
        
        #lang-select {
            background: #1a1f2b; color: var(--primary); border: 1px solid var(--primary);
            border-radius: 5px; padding: 5px; font-size: 12px;
        }

        .main-content {
            flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px;
            overflow-y: auto;
        }

        .calc-container {
            width: 100%; max-width: 500px; background: var(--panel);
            padding: 20px; border-radius: 25px; border: 1px solid #222;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .screen {
            background: #000; border-radius: 15px; padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--primary);
            text-align: left; direction: ltr;
        }
        #display-val { font-family: 'Orbitron'; font-size: 32px; color: #fff; min-height: 45px; overflow-x: auto; white-space: nowrap; }
        #display-step { font-size: 14px; color: var(--primary); opacity: 0.6; height: 20px; }

        .calc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        
        .btn {
            padding: 15px 5px; border: none; border-radius: 10px; font-family: 'Cairo';
            font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; transition: 0.2s;
            display: flex; justify-content: center; align-items: center;
        }
        .btn:active { transform: scale(0.92); opacity: 0.8; }
        
        .btn-num { background: var(--btn-num); font-size: 18px; }
        .btn-op { background: #161b22; color: var(--secondary); font-size: 18px; }
        .btn-sci { background: var(--btn-sci); color: var(--primary); font-size: 12px; }
        .btn-del { background: #3d1a1a; color: var(--danger); }
        .btn-eq { background: linear-gradient(135deg, var(--primary), #0066ff); grid-column: span 2; font-size: 20px; }

        .bottom-bar {
            background: #0a0d14; padding: 12px; display: flex; justify-content: space-around;
            border-top: 1px solid #222;
        }
        .quick-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .quick-btn:hover, .quick-btn:active { color: var(--primary); }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--panel); width: 95%; max-width: 550px;
            border-radius: 20px; border: 1px solid var(--primary);
            padding: 20px; position: relative; max-height: 90vh; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 10px; right: 10px; color: #fff; background: var(--danger); width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; border-radius: 50%; cursor: pointer; z-index: 100; }

        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .game-card { background: #1a1f2b; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); }
        
        .canvas-style { display: block; margin: 10px auto; background: #000; border: 1px solid #333; width: 100%; border-radius: 10px; }
        .white-bg { background: #fff !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">QUANTUM HUB PRO</div>
    <div style="display:flex; gap:10px;">
        <select id="lang-select">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
        <button class="btn btn-op" style="padding:5px 15px" onclick="openModal('draw-modal')">🎨</button>
    </div>
</header>

<main class="main-content">
    <div class="calc-container">
        <div class="screen">
            <div id="display-step"></div>
            <div id="display-val">0</div>
        </div>
        <div class="calc-grid">
            <button class="btn btn-sci" onclick="ins('Math.PI')">π</button>
            <button class="btn btn-sci" onclick="ins('Math.E')">e</button>
            <button class="btn btn-sci" onclick="ins('Math.abs(')">|x|</button>
            <button class="btn btn-del" onclick="clr()">AC</button>
            <button class="btn btn-del" onclick="del()">DEL</button>

            <button class="btn btn-sci" onclick="ins('Math.sin(')">sin</button>
            <button class="btn btn-sci" onclick="ins('Math.cos(')">cos</button>
            <button class="btn btn-sci" onclick="ins('Math.tan(')">tan</button>
            <button class="btn btn-sci" onclick="ins('Math.log10(')">log</button>
            <button class="btn btn-sci" onclick="ins('Math.log(')">ln</button>

            <button class="btn btn-sci" onclick="ins('**2')">x²</button>
            <button class="btn btn-sci" onclick="ins('**')">xʸ</button>
            <button class="btn btn-sci" onclick="ins('Math.sqrt(')">√</button>
            <button class="btn btn-sci" onclick="ins('Math.exp(')">eˣ</button>
            <button class="btn btn-op" onclick="ins('/')">÷</button>

            <button class="btn btn-num" onclick="ins('7')">7</button>
            <button class="btn btn-num" onclick="ins('8')">8</button>
            <button class="btn btn-num" onclick="ins('9')">9</button>
            <button class="btn btn-op" onclick="ins('*')">×</button>
            <button class="btn btn-sci" onclick="fact()">x!</button>

            <button class="btn btn-num" onclick="ins('4')">4</button>
            <button class="btn btn-num" onclick="ins('5')">5</button>
            <button class="btn btn-num" onclick="ins('6')">6</button>
            <button class="btn btn-op" onclick="ins('-')">−</button>
            <button class="btn btn-sci" onclick="ins('%')">mod</button>

            <button class="btn btn-num" onclick="ins('1')">1</button>
            <button class="btn btn-num" onclick="ins('2')">2</button>
            <button class="btn btn-num" onclick="ins('3')">3</button>
            <button class="btn btn-op" onclick="ins('+')">+</button>
            <button class="btn btn-sci" onclick="ins('(')">(</button>

            <button class="btn btn-num" onclick="ins('0')">0</button>
            <button class="btn btn-num" onclick="ins('.')">.</button>
            <button class="btn btn-sci" onclick="ins(')')">)</button>
            <button class="btn btn-eq" onclick="calculate()">=</button>
        </div>
        <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <button class="btn btn-sci" style="background:#1a1f2b" onclick="toBin()">Base 2 (BIN)</button>
            <button class="btn btn-sci" style="background:#1a1f2b" onclick="toHex()">Base 16 (HEX)</button>
        </div>
    </div>
</main>

<div class="bottom-bar">
    <button class="quick-btn" onclick="openModal('physics-modal')"><span>⚛️</span><span>فيزياء</span></button>
    <button class="quick-btn" onclick="openModal('game-modal')"><span>🎮</span><span>الألعاب (18)</span></button>
    <button class="quick-btn" onclick="openModal('timer-modal')"><span>⏱️</span><span>مؤقت</span></button>
    <button class="quick-btn" onclick="openModal('bmi-modal')"><span>💪</span><span>صحتي</span></button>
</div>

<!-- Modals -->
<div id="game-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('game-modal')">X</span>
        <h3 style="text-align:center">مركز الألعاب</h3>
        <div id="game-menu" class="game-grid">
            <div class="game-card" onclick="startTTT()"><span>❌</span><p>XO</p></div>
            <div class="game-card" onclick="startClicker()"><span>👆</span><p>النقر</p></div>
            <div class="game-card" onclick="startMathChallenge()"><span>➕</span><p>حساب</p></div>
            <div class="game-card" onclick="startRPS()"><span>✊</span><p>حجرة</p></div>
            <div class="game-card" onclick="startGuessNum()"><span>❓</span><p>خمن</p></div>
            <div class="game-card" onclick="startDice()"><span>🎲</span><p>نرد</p></div>
            <div class="game-card" onclick="startCoinFlip()"><span>🪙</span><p>عملة</p></div>
            <div class="game-card" onclick="startColorMatch()"><span>🎨</span><p>لون</p></div>
            <div class="game-card" onclick="startOddOneOut()"><span>🔍</span><p>غريب</p></div>
            <div class="game-card" onclick="startReaction()"><span>⚡</span><p>رد فعل</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>🧠</span><p>ذاكرة</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>🤠</span><p>إيموجي</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>🔠</span><p>كلمات</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>⌨️</span><p>كتابة</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>🔴</span><p>دائرة</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>💡</span><p>ضوء</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>⚖️</span><p>ميزان</p></div>
            <div class="game-card" onclick="alert('قيد التطوير')"><span>🔢</span><p>تتالي</p></div>
        </div>
        <div id="play-area" style="display:none; text-align:center; margin-top:20px;">
            <div id="game-container"></div>
            <button class="btn btn-op" style="margin-top:20px; width:100%" onclick="backToMenu()">العودة للقائمة</button>
        </div>
    </div>
</div>

<div id="physics-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('physics-modal')">X</span>
        <h3 style="text-align:center">فيزياء الجاذبية</h3>
        <canvas id="p-cvs" class="canvas-style" height="250"></canvas>
    </div>
</div>

<div id="draw-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('draw-modal')">X</span>
        <h3 style="text-align:center">لوحة الرسم</h3>
        <canvas id="d-cvs" class="canvas-style white-bg" height="350"></canvas>
        <button class="btn btn-del" style="width:100%" onclick="clearCanvas()">مسح</button>
    </div>
</div>

<div id="timer-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('timer-modal')">X</span>
        <div id="t-disp" style="font-size:60px; text-align:center; font-family:'Orbitron';">05:00</div>
        <button class="btn btn-op" style="width:100%" onclick="startT()">ابدأ</button>
    </div>
</div>

<div id="bmi-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('bmi-modal')">X</span>
        <h3 style="text-align:center">حاسبة الصحة</h3>
        <input type="number" id="bw" placeholder="الوزن (كجم)" style="width:100%; padding:10px; margin:10px 0;">
        <input type="number" id="bh" placeholder="الطول (سم)" style="width:100%; padding:10px; margin:10px 0;">
        <button class="btn btn-eq" style="width:100%" onclick="calcB()">احسب BMI</button>
        <div id="br" style="margin-top:10px; text-align:center;"></div>
    </div>
</div>

<script>
    // --- Calculator Logic ---
    let expr = "";
    function ins(v) { expr += v; update(); }
    function clr() { expr = ""; update(); document.getElementById('display-step').innerText = ""; }
    function del() { expr = expr.slice(0,-1); update(); }
    function update() { 
        let display = expr.replace(/Math\./g, '').replace(/10/g, '');
        document.getElementById('display-val').innerText = display || "0"; 
    }
    function calculate() { 
        try { 
            let result = eval(expr);
            document.getElementById('display-step').innerText = document.getElementById('display-val').innerText + " =";
            expr = result.toString();
            update();
        } catch(e) { alert("خطأ في الصيغة"); expr = ""; update(); } 
    }
    function fact() {
        let n = parseInt(eval(expr));
        let f = 1; for(let i=1; i<=n; i++) f *= i;
        expr = f.toString(); update();
    }
    function toBin() { try { expr = parseInt(eval(expr)).toString(2); update(); } catch(e){} }
    function toHex() { try { expr = parseInt(eval(expr)).toString(16).toUpperCase(); update(); } catch(e){} }

    // --- Modal Logic ---
    function openModal(id) { 
        document.getElementById(id).style.display='flex'; 
        if(id==='draw-modal') initDraw();
    }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    // --- Physics Engine ---
    const pcvs = document.getElementById('p-cvs'), pctx = pcvs.getContext('2d');
    let pBalls = [];
    pcvs.onclick = (e) => {
        const r = pcvs.getBoundingClientRect();
        pBalls.push({ x: e.clientX-r.left, y: e.clientY-r.top, vy: 2, vx: (Math.random()-0.5)*6, r: 12, c: 'hsl('+Math.random()*360+', 70%, 60%)' });
    }
    function pLoop() {
        pctx.fillStyle='rgba(5,7,10,0.3)'; pctx.fillRect(0,0,pcvs.width,pcvs.height);
        pBalls.forEach(b => {
            b.vy += 0.25; b.x += b.vx; b.y += b.vy;
            if(b.y > pcvs.height - b.r) { b.y = pcvs.height - b.r; b.vy *= -0.7; }
            if(b.x > pcvs.width - b.r || b.x < b.r) b.vx *= -1;
            pctx.beginPath(); pctx.arc(b.x, b.y, b.r, 0, 7); pctx.fillStyle=b.c; pctx.fill();
        });
        requestAnimationFrame(pLoop);
    }
    pLoop();

    // --- Games Logic ---
    const gCont = document.getElementById('game-container');
    function backToMenu() { document.getElementById('game-menu').style.display='grid'; document.getElementById('play-area').style.display='none'; gCont.innerHTML = ''; }
    function showGame() { document.getElementById('game-menu').style.display='none'; document.getElementById('play-area').style.display='block'; }

    function startTTT() {
        showGame(); gCont.innerHTML = '<div id="ttt" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:180px;margin:auto;"></div>';
        let turn = 'X';
        for(let i=0; i<9; i++) {
            let b = document.createElement('div'); b.style="width:55px;height:55px;background:#222;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:1px solid #444;";
            b.onclick = () => { if(!b.innerText) { b.innerText=turn; turn=turn==='X'?'O':'X'; } };
            gCont.querySelector('#ttt').appendChild(b);
        }
    }
    function startClicker() { showGame(); let c=0; gCont.innerHTML=`<div onclick="this.innerText=++c" style="width:100px;height:100px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:auto;font-size:30px;color:#000;">0</div>`; }
    function startMathChallenge() { showGame(); let a=Math.floor(Math.random()*50), b=Math.floor(Math.random()*50); gCont.innerHTML=`<h4>${a}+${b}=?</h4><input type="number" id="ma"><button onclick="if(document.getElementById('ma').value==${a+b}){alert('صح');startMathChallenge()}">تحقق</button>`; }
    function startRPS() { showGame(); gCont.innerHTML=`<button onclick="playRPS('✊')">✊</button><button onclick="playRPS('✋')">✋</button><button onclick="playRPS('✌️')">✌️</button><div id="rr"></div>`; }
    window.playRPS = (u) => { const os=['✊','✋','✌️']; const c=os[Math.floor(Math.random()*3)]; document.getElementById('rr').innerText=`أنت: ${u} | هو: ${c}`; }
    function startGuessNum() { showGame(); let t=Math.floor(Math.random()*20)+1; gCont.innerHTML=`<input type="number" id="gn"><button onclick="let v=document.getElementById('gn').value;if(v==${t}){alert('صح');startGuessNum()}else alert(v>${t}?'أقل':'أكبر')">جرب</button>`; }
    function startDice() { showGame(); gCont.innerHTML=`<div id="dd" style="font-size:50px">🎲</div><button onclick="document.getElementById('dd').innerText=Math.floor(Math.random()*6)+1">ارمي</button>`; }
    function startCoinFlip() { showGame(); gCont.innerHTML=`<div id="cf" style="font-size:50px">🪙</div><button onclick="document.getElementById('cf').innerText=Math.random()>0.5?'ملك':'كتابة'">اقلب</button>`; }
    function startColorMatch() { showGame(); const cs=['red','blue','green','yellow']; const t=cs[Math.floor(Math.random()*4)]; gCont.innerHTML=`<h4 style="color:${t}">ما اللون؟</h4>${cs.map(c=>`<button onclick="if('${c}'==='${t}'){alert('صح');startColorMatch()}" style="background:${c};width:40px;height:40px;"></button>`).join('')}`; }
    function startOddOneOut() { showGame(); gCont.innerHTML=`<span onclick="alert('صح');startOddOneOut()">🍐</span><span>🍎</span><span>🍎</span>`; }
    function startReaction() { showGame(); gCont.innerHTML=`<div id="rb" style="width:80px;height:80px;background:red;margin:auto;" onclick="if(this.style.background==='green'){alert('ممتاز');startReaction()}">انتظر..</div>`; setTimeout(()=>{const b=document.getElementById('rb');if(b){b.style.background='green';b.innerText='الآن!'}}, 1000+Math.random()*2000); }

    // --- Drawing Logic ---
    function initDraw() {
        const dcvs = document.getElementById('d-cvs'), dctx = dcvs.getContext('2d');
        dcvs.width = dcvs.offsetWidth;
        let drw = false;
        dcvs.onmousedown = dcvs.ontouchstart = (e) => { drw=true; dctx.beginPath(); };
        dcvs.onmouseup = dcvs.ontouchend = () => drw=false;
        dcvs.onmousemove = dcvs.ontouchmove = (e) => {
            if(!drw) return;
            const r = dcvs.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;
            dctx.lineWidth = 3; dctx.strokeStyle = '#000'; dctx.lineTo(x, y); dctx.stroke();
            if(e.touches) e.preventDefault();
        };
    }
    function clearCanvas() { const c=document.getElementById('d-cvs'); c.getContext('2d').clearRect(0,0,c.width,c.height); }

    // --- Tools Logic ---
    function calcB() { 
        let w=document.getElementById('bw').value, h=document.getElementById('bh').value/100;
        if(w&&h) document.getElementById('br').innerText="BMI: "+(w/(h*h)).toFixed(1);
    }
    let tInt, tS=300;
    function startT() {
        clearInterval(tInt); tInt=setInterval(()=>{
            if(tS<=0){clearInterval(tInt);alert("انتهى!");return;} tS--;
            document.getElementById('t-disp').innerText=Math.floor(tS/60).toString().padStart(2,'0')+":"+(tS%60).toString().padStart(2,
