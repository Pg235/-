<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة علمية AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

h1{
  padding:15px;
  background:#020617;
  font-size:20px;
}

select{
  margin:10px;
  padding:8px;
  border-radius:8px;
}

.calculator{
  width:340px;
  margin:20px auto;
  padding:15px;
  background:#020617;
  border-radius:20px;
  box-shadow:0 0 20px #000;
}

#display{
  width:100%;
  height:65px;
  font-size:22px;
  text-align:right;
  padding:10px;
  border:none;
  border-radius:12px;
  margin-bottom:10px;
}

button{
  width:22%;
  height:55px;
  margin:4px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
}

button:hover{
  background:#334155;
}

.ai{ background:#22c55e; }
.mic{ background:#0ea5e9; }

</style>
</head>

<body>

<h1 id="title">آلة علمية مدعومة بالذكاء الاصطناعي</h1>

<select onchange="changeLang(this.value)">
  <option value="ar">العربية</option>
  <option value="en">English</option>
</select>

<div class="calculator">

<input id="display" readonly>

<br>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">−</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="add('+')">+</button>

<button onclick="add('Math.sin(')">sin</button>
<button onclick="add('Math.cos(')">cos</button>
<button onclick="add('Math.tan(')">tan</button>
<button onclick="add('Math.sqrt(')">√</button>

<button onclick="clearDisplay()">AC</button>
<button onclick="back()">⌫</button>

<button class="ai" onclick="runAI()">AI</button>
<button class="mic" onclick="startVoice()">🎤</button>

</div>

<script>
let display = document.getElementById("display");
let currentLang = "ar";

/* أزرار */
function add(v){ display.value += v; }
function clearDisplay(){ display.value = ""; }
function back(){ display.value = display.value.slice(0,-1); }

function calculate(){
  try{
    display.value = eval(display.value);
  }catch{
    display.value = "خطأ";
  }
}

/* تغيير اللغة */
function changeLang(lang){
  currentLang = lang;

  if(lang === "ar"){
    document.getElementById("title").innerText = "آلة علمية مدعومة بالذكاء الاصطناعي";
  }else{
    document.getElementById("title").innerText = "AI Scientific Calculator";
  }
}

/* AI */
async function runAI(){
  let input = display.value;

  if(!input){
    display.value = currentLang === "ar" ? "اكتب شي" : "Type something";
    return;
  }

  display.value = "AI...";

  try{
    let res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer 
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content: currentLang === "ar"
              ? "احسب واعط النتيجة فقط"
              : "Solve and give only result"
          },
          {role:"user",content:input}
        ]
      })
    });

    let data = await res.json();
    display.value = data.choices[0].message.content;

  }catch{
    display.value = "خطأ AI";
  }
}

/* مايك */
function startVoice(){
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = currentLang === "ar" ? "ar-SA" : "en-US";

  recognition.start();

  recognition.onstart = () => {
    display.value = "🎤...";
  };

  recognition.onresult = (event) => {
    display.value = event.results[0][0].transcript;
  };
}
</script>

</body>
</html>
