<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Hub - Physics & Logic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #00ff88;
            --danger: #ff003c;
            --dark-bg: #05070a;
            --panel: #0f121a;
            --btn-num: #1c212d;
            --accent: #ff00ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0d14;
            border-bottom: 2px solid var(--primary);
        }

        .logo { font-family: 'Orbitron'; color: var(--primary); font-size: 18px; text-shadow: 0 0 10px var(--primary); }
        
        #lang-select {
            background: #1a1f2b; color: var(--primary); border: 1px solid var(--primary);
            border-radius: 5px; padding: 5px; font-size: 12px;
        }

        .main-content {
            flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px;
        }

        .calc-container {
            width: 100%; max-width: 400px; background: var(--panel);
            padding: 15px; border-radius: 20px; border: 1px solid #222;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .screen {
            background: #000; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; border: 1px solid var(--primary);
            text-align: left; direction: ltr;
        }
        #display-val { font-family: 'Orbitron'; font-size: 28px; color: #fff; min-height: 40px; overflow: hidden; }
        #display-step { font-size: 12px; color: var(--primary); opacity: 0.6; height: 15px; }

        .calc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .btn {
            padding: 12px 5px; border: none; border-radius: 8px; font-family: 'Cairo';
            font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); }
        .btn-num { background: var(--btn-num); }
        .btn-op { background: #161b22; color: var(--secondary); }
        .btn-del { background: #3d1a1a; color: var(--danger); }
        .btn-eq { background: linear-gradient(135deg, var(--primary), #0066ff); grid-column: span 2; }

        .bottom-bar {
            background: #0a0d14; padding: 10px; display: flex; justify-content: space-around;
            border-top: 1px solid #222;
        }
        .quick-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .quick-btn:hover { color: var(--primary); }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--panel); width: 90%; max-width: 450px;
            border-radius: 20px; border: 1px solid var(--primary);
            padding: 20px; position: relative; max-height: 85vh; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 10px; right: 10px; color: var(--danger); cursor: pointer; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; background: #222; border-radius: 50%; z-index: 10; }

        /* Physics Elements */
        .phys-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; }
        canvas { display: block; margin: 10px auto; background: #000; border: 1px solid #333; width: 100%; height: auto; border-radius: 10px; }
        
        /* Game Elements */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .game-card { background: #1a1f2b; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 180px; margin: 0 auto; }
        .ttt-box { width: 55px; height: 55px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">QUANTUM HUB</div>
    <div style="display:flex; gap:10px;">
        <select id="lang-select" onchange="applyLang()">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
        <button class="btn btn-op" style="padding:5px 10px" onclick="openModal('draw-modal')">🎨</button>
    </div>
</header>

<main class="main-content">
    <div class="calc-container">
        <div class="screen">
            <div id="display-step"></div>
            <div id="display-val">0</div>
        </div>
        <div class="calc-grid">
            <button class="btn btn-num" onclick="ins('Math.sin(')">sin</button>
            <button class="btn btn-num" onclick="ins('Math.cos(')">cos</button>
            <button class="btn btn-num" onclick="ins('Math.sqrt(')">√</button>
            <button class="btn btn-del" onclick="clr()">AC</button>
            <button class="btn btn-del" onclick="del()">DEL</button>

            <button class="btn btn-num" onclick="ins('7')">7</button>
            <button class="btn btn-num" onclick="ins('8')">8</button>
            <button class="btn btn-num" onclick="ins('9')">9</button>
            <button class="btn btn-op" onclick="ins('/')">÷</button>
            <button class="btn btn-op" onclick="ins('*')">×</button>

            <button class="btn btn-num" onclick="ins('4')">4</button>
            <button class="btn btn-num" onclick="ins('5')">5</button>
            <button class="btn btn-num" onclick="ins('6')">6</button>
            <button class="btn btn-op" onclick="ins('-')">−</button>
            <button class="btn btn-op" onclick="ins('+')">+</button>

            <button class="btn btn-num" onclick="ins('1')">1</button>
            <button class="btn btn-num" onclick="ins('2')">2</button>
            <button class="btn btn-num" onclick="ins('3')">3</button>
            <button class="btn btn-eq" onclick="calculate()">=</button>

            <button class="btn btn-num" onclick="ins('0')">0</button>
            <button class="btn btn-num" onclick="ins('.')">.</button>
            <button class="btn btn-num" onclick="ins('(')">(</button>
            <button class="btn btn-num" onclick="ins(')')">)</button>
            <button class="btn btn-op" onclick="toBin()">BIN</button>
        </div>
    </div>
</main>

<div class="bottom-bar">
    <button class="quick-btn" onclick="openModal('physics-modal')"><span>⚛️</span><span data-i18n="phys">فيزياء</span></button>
    <button class="quick-btn" onclick="openModal('game-modal')"><span>🎮</span><span data-i18n="games">ألعاب</span></button>
    <button class="quick-btn" onclick="openModal('timer-modal')"><span>⏱️</span><span data-i18n="timer">مؤقت</span></button>
    <button class="quick-btn" onclick="openModal('bmi-modal')"><span>💪</span><span data-i18n="bmi">صحتي</span></button>
</div>

<!-- Physics Modal -->
<div id="physics-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('physics-modal')">X</span>
        <h3 style="text-align:center" data-i18n="physTitle">المختبر الفيزيائي</h3>
        <div style="margin-top:15px;">
            <p style="font-size:12px; color:var(--primary); margin-bottom:10px;">محاكاة الجاذبية (اضغط لإضافة كرات):</p>
            <canvas id="p-cvs" width="300" height="200" onclick="addPhysBall(event)"></canvas>
            
            <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
                <p data-i18n="forceCalc">حساب القوة (F = m * a)</p>
                <input type="number" id="pmass" placeholder="الكتلة (كجم)" class="phys-input">
                <input type="number" id="pacc" placeholder="التسارع (م/ث²)" class="phys-input">
                <button class="btn btn-eq" style="width:100%" onclick="calcForce()">احسب القوة</button>
                <div id="p-res" style="text-align:center; margin-top:10px; color:var(--secondary); font-weight:bold;"></div>
            </div>
        </div>
    </div>
</div>

<!-- Other Modals (Same as before) -->
<div id="game-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('game-modal')">X</span>
        <h3 style="text-align:center">مركز الألعاب</h3>
        <div class="game-grid" id="game-menu">
            <div class="game-card" onclick="playSnake()">🐍 Snake</div>
            <div class="game-card" onclick="playTTT()">❌ XO</div>
        </div>
        <div id="play-area" style="display:none; text-align:center;">
            <div id="game-screen"></div>
            <button class="btn btn-op" style="margin-top:10px" onclick="resetGames()">عودة</button>
        </div>
    </div>
</div>

<div id="timer-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('timer-modal')">X</span>
        <h3 style="text-align:center">المؤقت</h3>
        <div id="t-disp" style="font-size:50px; text-align:center; color:var(--primary); font-family:'Orbitron'; margin:20px 0;">05:00</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-op" onclick="startT()">ابدأ</button>
            <button class="btn btn-del" onclick="stopT()">تصفير</button>
        </div>
    </div>
</div>

<div id="draw-modal" class="modal">
    <div class="modal-content" style="max-width:350px;">
        <span class="close-btn" onclick="closeModal('draw-modal')">X</span>
        <canvas id="d-cvs" width="300" height="350" style="background:#fff;"></canvas>
        <button class="btn btn-del" onclick="clearCanvas()" style="width:100%; margin-top:10px;">مسح</button>
    </div>
</div>

<div id="bmi-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('bmi-modal')">X</span>
        <h3 style="text-align:center">حاسبة BMI</h3>
        <input type="number" id="bw" placeholder="الوزن" class="phys-input" style="margin-top:15px">
        <input type="number" id="bh" placeholder="الطول (سم)" class="phys-input">
        <button class="btn btn-eq" style="width:100%" onclick="calcB()">احسب</button>
        <div id="br" style="text-align:center; margin-top:10px;"></div>
    </div>
</div>

<script>
    let expr = "";
    const translations = {
        ar: { phys: "فيزياء", games: "ألعاب", timer: "مؤقت", bmi: "صحتي", physTitle: "المختبر الفيزيائي", forceCalc: "حساب القوة (نيوتن)" },
        en: { phys: "Physics", games: "Games", timer: "Timer", bmi: "Health", physTitle: "Physics Lab", forceCalc: "Force Calculation" }
    };

    function applyLang() {
        let l = document.getElementById('lang-select').value;
        document.getElementById('main-html').dir = l === 'ar' ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = translations[l][el.getAttribute('data-i18n')];
        });
    }

    // --- Calculator Logic ---
    function ins(v) { expr += v; update(); }
    function clr() { expr = ""; update(); }
    function del() { expr = expr.slice(0,-1); update(); }
    function update() { document.getElementById('display-val').innerText = expr || "0"; }
    function calculate() { try { expr = eval(expr).toString(); update(); } catch(e) { expr=""; alert("Error"); } }
    function toBin() { try { expr = parseInt(eval(expr)).toString(2); update(); } catch(e){} }

    // --- Physics Lab Simulation ---
    const pcvs = document.getElementById('p-cvs'), pctx = pcvs.getContext('2d');
    let pBalls = [];
    function addPhysBall(e) {
        pBalls.push({ x: e.offsetX, y: e.offsetY, vy: 2, vx: (Math.random()-0.5)*4, r: 10, c: `hsl(${Math.random()*360}, 70%, 50%)` });
    }
    function updatePhys() {
        pctx.fillStyle = '#000'; pctx.fillRect(0,0,300,200);
        pBalls.forEach(b => {
            b.vy += 0.2; b.x += b.vx; b.y += b.vy;
            if(b.y + b.r > 200) { b.y = 200 - b.r; b.vy *= -0.7; }
            if(b.x + b.r > 300 || b.x - b.r < 0) b.vx *= -1;
            pctx.beginPath(); pctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
            pctx.fillStyle = b.c; pctx.fill();
        });
        requestAnimationFrame(updatePhys);
    }
    function calcForce() {
        let m = document.getElementById('pmass').value, a = document.getElementById('pacc').value;
        if(m && a) document.getElementById('p-res').innerText = (m*a) + " Newton (نيوتن)";
    }
    updatePhys();

    // --- Snake & Games ---
    function playSnake() {
        document.getElementById('game-menu').style.display='none';
        document.getElementById('play-area').style.display='block';
        const s = document.getElementById('game-screen');
        s.innerHTML = '<canvas id="s-cvs" width="250" height="250"></canvas>';
        const cvs = document.getElementById('s-cvs'), ct = cvs.getContext('2d');
        let snake = [{x:10,y:10}], food={x:5,y:5}, dx=1, dy=0;
        window.gInt = setInterval(()=>{
            let head = {x:snake[0].x+dx, y:snake[0].y+dy};
            if(head.x<0||head.x>=20||head.y<0||head.y>=20) return resetGames();
            snake.unshift(head);
            if(head.x===food.x&&head.y===food.y) food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}; else snake.pop();
            ct.fillStyle='#000'; ct.fillRect(0,0,250,250);
            ct.fillStyle='#0f8'; snake.forEach(p=>ct.fillRect(p.x*12.5, p.y*12.5, 11, 11));
            ct.fillStyle='#f05'; ct.fillRect(food.x*12.5, food.y*12.5, 11, 11);
        },150);
        document.onkeydown=(e)=>{
            if(e.key==='ArrowUp'&&dy===0){dx=0;dy=-1} if(e.key==='ArrowDown'&&dy===0){dx=0;dy=1}
            if(e.key==='ArrowLeft'&&dx===0){dx=-1;dy=0} if(e.key==='ArrowRight'&&dx===0){dx=1;dy=0}
        };
    }
    function playTTT() {
        document.getElementById('game-menu').style.display='none';
        document.getElementById('play-area').style.display='block';
        const s = document.getElementById('game-screen');
        s.innerHTML = '<div class="ttt-grid"></div>';
        for(let i=0; i<9; i++){
            let b = document.createElement('div'); b.className='ttt-box';
            b.onclick=()=>{if(!b.innerText){b.innerText='X';b.style.color='#00f2ff'}};
            s.querySelector('.ttt-grid').appendChild(b);
        }
    }
    function resetGames() { clearInterval(window.gInt); document.getElementById('game-menu').style.display='grid'; document.getElementById('play-area').style.display='none'; }

    // --- BMI & Timer & Draw ---
    function calcB() {
        let w=document.getElementById('bw').value, h=document.getElementById('bh').value/100;
        if(w&&h) document.getElementById('br').innerText = "BMI: " + (w/(h*h)).toFixed(1);
    }
    let tInt, tS=300;
    function startT() {
        clearInterval(tInt); tInt=setInterval(()=>{
            if(tS<=0) return clearInterval(tInt); tS--;
            document.getElementById('t-disp').innerText = Math.floor(tS/60).toString().padStart(2,'0')+":"+(tS%60).toString().padStart(2,'0');
        },1000);
    }
    function stopT() { clearInterval(tInt); tS=300; document.getElementById('t-disp').innerText="05:00"; }
    
    const dcvs=document.getElementById('d-cvs'), dctx=dcvs.getContext('2d');
    let drw=false;
    dcvs.onmousedown=()=>{drw=true}; dcvs.onmouseup=()=>{drw=false; dctx.beginPath();};
    dcvs.onmousemove=(e)=>{ if(!drw)return; dctx.lineWidth=4; dctx.lineCap='round'; dctx.lineTo(e.offsetX, e.offsetY); dctx.stroke(); dctx.beginPath(); dctx.moveTo(e.offsetX, e.offsetY); };
    function clearCanvas() { dctx.clearRect(0,0,300,350); }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; resetGames(); }
</script>
</body>
</html>
