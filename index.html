<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title></title> bayan آلة حاسبة </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070912;
            --glass-bg: rgba(20, 25, 45, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-primary: #00ffd5;
            --neon-secondary: #7c4dff;
            --neon-accent: #ff007a;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(124, 77, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 255, 213, 0.1) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
        }

        /* Screen Section */
        .screen-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        .history-view {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-dim);
            height: 30px;
            text-align: left;
            direction: ltr;
            opacity: 0.8;
        }

        .display-main {
            font-family: 'JetBrains Mono', monospace;
            font-size: 40px;
            text-align: left;
            direction: ltr;
            color: var(--neon-primary);
            text-shadow: 0 0 20px rgba(0, 255, 213, 0.3);
            margin: 10px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .ai-status-container {
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: auto;
            padding-top: 12px;
        }

        .ai-status-bar {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.5;
            max-height: 80px;
            overflow-y: auto;
        }

        /* Keyboard Grid */
        .grid-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            flex-grow: 1;
        }

        button {
            border: none;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.03);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
        }

        button:hover { background: rgba(255,255,255,0.08); border-color: var(--glass-border); }
        button:active { transform: scale(0.92); }

        .btn-op { color: var(--neon-primary); background: rgba(0, 255, 213, 0.05); }
        .btn-ai-main { 
            grid-column: span 2; 
            background: linear-gradient(135deg, var(--neon-secondary), #4f46e5);
            font-weight: 700;
            font-size: 13px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-eq { background: var(--neon-primary); color: #000; font-weight: 800; font-size: 26px; box-shadow: 0 0 20px rgba(0, 255, 213, 0.3); }
        .btn-func { font-size: 13px; color: var(--text-dim); }
        .btn-accent { color: var(--neon-accent); background: rgba(255, 0, 122, 0.05); }

        /* Modal Styles */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #0f172a;
            padding: 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 40px rgba(124, 77, 255, 0.2);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 15px;
            border-radius: 16px;
            font-family: 'Cairo';
            margin: 20px 0;
            resize: none;
            outline: none;
        }

        .loading-ring {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--neon-primary);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-badge {
            background: rgba(124, 77, 255, 0.2);
            color: var(--neon-secondary);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            margin-left: 5px;
        }

        .latex-display {
            font-family: 'JetBrains Mono';
            background: #000;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            user-select: text;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Screen -->
    <div class="screen-glass">
        <div class="history-view" id="history"></div>
        <div class="display-main" id="out">0</div>
        <div class="ai-status-container">
            <div style="display: flex; align-items: center; margin-bottom: 5px;">
                <span class="ai-badge">حاسبة bayan</span>
                <span id="ai-loading" style="display:none" class="loading-ring"></span>
            </div>
            <div class="ai-status-bar" id="ai-box">
                مرحباً بك في مستقبل الحساب. جرب ✨ حل المسائل اللفظية أو اطلب ✨ خطة دراسة.
            </div>
            <div id="latex-box" class="latex-display" style="display:none"></div>
        </div>
    </div>

    <!-- Controls Pad -->
    <div class="grid-pad">
        <button class="btn-ai-main" onclick="openAIModal()">✨ حل مسألة لفظية</button>
        <button class="btn-ai-main" style="background: var(--bg-dark); border: 1px solid var(--neon-secondary)" onclick="generateStudyPlan()">✨ خطة دراسة</button>
        
        <button class="btn-accent" onclick="clearAll()">AC</button>
        <button class="btn-func" onclick="add('Math.sin(')">sin</button>
        <button class="btn-func" onclick="add('Math.cos(')">cos</button>
        <button class="btn-func" onclick="add('Math.tan(')">tan</button>
        <button class="btn-op" onclick="add('/')">÷</button>
        <button class="btn-accent" onclick="back()">⌫</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="btn-op" onclick="add('*')">×</button>
        <button class="btn-func" onclick="getLatex()">✨ LaTeX</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="btn-op" onclick="add('-')">−</button>
        <button class="btn-func" onclick="askGeminiToExplain()">✨ شرح</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="btn-op" onclick="add('+')">+</button>
        <button class="btn-func" onclick="add('Math.sqrt(')">√</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button class="btn-func" onclick="add('(')">(</button>
        <button class="btn-func" onclick="add(')')">)</button>
        <button class="btn-eq" onclick="calc()">=</button>
    </div>
</div>

<!-- Modals -->
<div id="ai-modal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--neon-secondary); display: flex; align-items: center; gap: 10px;">
            <span>✨ ذكاء الاصطناعي</span>
        </h3>
        <textarea id="ai-input" placeholder="اكتب مسألتك هنا... مثلاً: إذا كان لدي 3 تفاحات وأضفت ضعفها..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="closeAIModal()" style="flex:1; background: #1e293b; padding: 12px; font-size: 14px;">إلغاء</button>
            <button onclick="solveWordProblem()" style="flex:2; background: var(--neon-secondary); padding: 12px; font-size: 14px;">تحليل وحل</button>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; 
    let currentExp = "";
    let historyStack = [];
    const outDisplay = document.getElementById('out');
    const aiBox = document.getElementById('ai-box');
    const historyBox = document.getElementById('history');
    const loadingRing = document.getElementById('ai-loading');
    const latexBox = document.getElementById('latex-box');

    function add(v) {
        currentExp += v;
        latexBox.style.display = "none";
        render();
    }

    function render() {
        let pretty = currentExp
            .replace(/Math\.sin\(/g, 'sin(')
            .replace(/Math\.cos\(/g, 'cos(')
            .replace(/Math\.tan\(/g, 'tan(')
            .replace(/Math\.PI/g, 'π')
            .replace(/Math\.sqrt\(/g, '√(')
            .replace(/\*/g, '×')
            .replace(/\//g, '÷');
        outDisplay.innerText = pretty || "0";
    }

    function clearAll() {
        currentExp = "";
        latexBox.style.display = "none";
        render();
        aiBox.innerText = "جاهز للمهمة التالية.";
    }

    function back() {
        currentExp = currentExp.slice(0, -1);
        render();
    }

    function calc() {
        try {
            let result = eval(currentExp);
            historyBox.innerText = outDisplay.innerText + " =";
            let entry = outDisplay.innerText + " = " + result;
            historyStack.push(entry);
            currentExp = result.toString();
            render();
            aiBox.innerText = "اكتملت العملية. هل تريد شرحاً للنتيجة؟";
        } catch(e) {
            aiBox.innerText = "خطأ في الصيغة الرياضية.";
        }
    }

    // --- Gemini API Engine ---

    async function callGemini(prompt, systemPrompt) {
        loadingRing.style.display = "inline-block";
        let retries = 0;
        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        while (retries < 5) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                loadingRing.style.display = "none";
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) {
                retries++;
                await delay(Math.pow(2, retries) * 1000);
            }
        }
        loadingRing.style.display = "none";
        throw new Error("Timeout");
    }

    async function speak(text) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "تحدث بوضوح: " + text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                    }
                })
            });
            const data = await response.json();
            const base64Audio = data.candidates[0].content.parts[0].inlineData.data;
            const audioBlob = b64toBlob(base64Audio, "audio/wav");
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play();
        } catch(e) { console.error(e); }
    }

    function b64toBlob(b64, type) {
        const bin = atob(b64);
        const array = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) array[i] = bin.charCodeAt(i);
        return new Blob([array], {type});
    }

    // --- Features ---

    async function askGeminiToExplain() {
        if (!currentExp) return;
        const prompt = "اشرح هذه العملية: " + outDisplay.innerText;
        const sys = "أنت معلم رياضيات بارع. اشرح العملية والنتيجة باختصار شديد وممتع بالعربية.";
        try {
            const res = await callGemini(prompt, sys);
            aiBox.innerText = res;
            speak(res);
        } catch(e) { aiBox.innerText = "عذراً، الحاسبة مشغول حالياً."; }
    }

    async function solveWordProblem() {
        const input = document.getElementById('ai-input').value;
        if (!input) return;
        closeAIModal();
        const sys = "حول المسألة اللفظية لمعادلة جافاسكريبت. أجب بصيغة JSON فقط: {'equation': '...', 'explanation': '...'}";
        try {
            const resText = await callGemini(input, sys);
            const data = JSON.parse(resText.replace(/```json/g, '').replace(/```/g, ''));
            currentExp = data.equation;
            render();
            aiBox.innerText = data.explanation;
            speak(data.explanation);
        } catch(e) { aiBox.innerText = "المسألة معقدة قليلاً، حاول تبسيطها."; }
    }

    async function generateStudyPlan() {
        if (historyStack.length === 0) {
            aiBox.innerText = "قم ببعض العمليات أولاً لأتمكن من تحليل مستواك واقتراح خطة!";
            return;
        }
        const prompt = "بناءً على هذه العمليات: " + historyStack.join(", ") + ". اقترح 3 مواضيع رياضية يجب أن أدرسها.";
        const sys = "أنت مستشار تعليمي. حلل العمليات واقترح مواضيع دراسية بالعربية في نقاط قصيرة جداً.";
        try {
            const res = await callGemini(prompt, sys);
            aiBox.innerText = "✨ خطتك المقترحة:\n" + res;
        } catch(e) { aiBox.innerText = "تعذر جلب الخطة حالياً."; }
    }

    async function getLatex() {
        if (!currentExp) return;
        const prompt = "حول هذه العملية إلى صيغة LaTeX: " + outDisplay.innerText;
        const sys = "أنت خبير LaTeX. أعد الصيغة فقط بدون أي كلام إضافي.";
        try {
            const res = await callGemini(prompt, sys);
            latexBox.innerText = res;
            latexBox.style.display = "block";
            aiBox.innerText = "تم توليد صيغة LaTeX الأكاديمية.";
        } catch(e) { aiBox.innerText = "خطأ في تحويل الصيغة."; }
    }

    function openAIModal() { document.getElementById('ai-modal').style.display = 'flex'; }
    function closeAIModal() { document.getElementById('ai-modal').style.display = 'none'; }
</script>

</body>
</html>
